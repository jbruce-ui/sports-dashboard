<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search — Sports Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f3f4f6;
      color: #111827;
      min-height: 100vh;
    }

    header {
      background: white;
      border-bottom: 1px solid #e5e7eb;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }

    .nav-links { display: flex; align-items: center; gap: 16px; }
    .nav-links a { font-size: 13px; color: #2563eb; text-decoration: none; font-weight: 500; }
    .nav-links a:hover { text-decoration: underline; }

    .search-bar {
      padding: 16px 24px;
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
    }

    .search-bar input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }
    .search-bar input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }

    .btn { background: #2563eb; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; transition: background 0.15s; }
    .btn:hover { background: #1d4ed8; }
    .btn-sm { padding: 5px 12px; font-size: 12px; border-radius: 6px; }
    .btn-green { background: #059669; }
    .btn-green:hover { background: #047857; }
    .btn-red { background: #dc2626; }
    .btn-red:hover { background: #b91c1c; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
      gap: 20px;
      padding: 0 24px 24px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .card { background: white; border: 1px solid #e5e7eb; border-radius: 10px; overflow: hidden; }
    .card-full { grid-column: 1 / -1; }
    .card-header { padding: 14px 18px; border-bottom: 1px solid #f3f4f6; display: flex; align-items: center; gap: 8px; }
    .card-header h2 { font-size: 14px; font-weight: 600; color: #374151; }
    .card-body { padding: 0; font-size: 13.5px; color: #374151; max-height: 500px; overflow-y: auto; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 10px 14px; font-weight: 600; color: #6b7280; border-bottom: 1px solid #e5e7eb; background: #f9fafb; position: sticky; top: 0; }
    td { padding: 10px 14px; border-bottom: 1px solid #f3f4f6; }
    tr:hover td { background: #f9fafb; }

    .score { font-weight: 700; color: #2563eb; text-align: center; }
    .score-pending { color: #9ca3af; font-style: italic; }
    .score-live { color: #dc2626; font-weight: 700; }
    .team-name { font-weight: 500; }
    .date-col { color: #6b7280; white-space: nowrap; }
    .venue-col { color: #9ca3af; font-size: 12px; }
    .empty { padding: 24px; color: #9ca3af; font-style: italic; font-size: 13px; text-align: center; }
    .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
    .tag-fav { background: #fef3c7; color: #92400e; }
    .tag-league { background: #eff6ff; color: #1d4ed8; }
    .tag-live { background: #fef2f2; color: #dc2626; }

    .fav-star { cursor: pointer; font-size: 16px; transition: transform 0.15s; }
    .fav-star:hover { transform: scale(1.2); }

    .loading { display: flex; align-items: center; justify-content: center; padding: 40px; color: #9ca3af; gap: 10px; }
    .spinner { width: 16px; height: 16px; border: 2px solid #e5e7eb; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.65s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <h1>Search Teams</h1>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/search">Search</a>
    <a href="/standings">Standings</a>
    <a href="/calendar">Calendar</a>
    <a href="/chat">Chat</a>
  </div>
</header>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="Search for a team... (e.g. Arsenal, Lakers, Yankees)" onkeydown="if(event.key==='Enter') searchTeams()" autofocus>
  <button class="btn" onclick="searchTeams()">Search</button>
</div>

<div class="grid">
  <div class="card card-full">
    <div class="card-header"><h2>Search Results</h2></div>
    <div class="card-body" id="searchResults">
      <div class="empty">Search for a team above</div>
    </div>
  </div>
  <div class="card">
    <div class="card-header"><h2 id="teamFixturesTitle">Upcoming Fixtures</h2></div>
    <div class="card-body" id="teamFixtures">
      <div class="empty">Select a team to see fixtures</div>
    </div>
  </div>
  <div class="card">
    <div class="card-header"><h2 id="teamResultsTitle">Recent Results</h2></div>
    <div class="card-body" id="teamResults">
      <div class="empty">Select a team to see results</div>
    </div>
  </div>
</div>

<script>
  let favorites = {};

  function eventsTable(events, showCalBtn) {
    if (!events || !events.length) return '<div class="empty">No events found</div>';
    let html = '<table><thead><tr><th>Date</th><th>Time</th><th>Home</th><th>Score</th><th>Away</th><th>Venue</th>';
    if (showCalBtn) html += '<th></th>';
    html += '</tr></thead><tbody>';
    events.forEach(e => {
      let scoreHtml;
      if (e.home_score != null && e.away_score != null) {
        const cls = e.status && e.status.includes('Progress') ? 'score-live' : 'score';
        scoreHtml = `<span class="${cls}">${e.home_score} - ${e.away_score}</span>`;
      } else {
        scoreHtml = '<span class="score-pending">-</span>';
      }
      const statusTag = e.status && e.status.includes('Progress') ? ' <span class="tag tag-live">LIVE</span>' : '';
      html += `<tr>
        <td class="date-col">${e.date || ''}</td>
        <td class="date-col">${(e.time || '').substring(0,5)}</td>
        <td class="team-name">${e.home_team || ''}</td>
        <td>${scoreHtml}${statusTag}</td>
        <td class="team-name">${e.away_team || ''}</td>
        <td class="venue-col">${(e.venue || '').substring(0,30)}</td>`;
      if (showCalBtn) {
        html += `<td><button class="btn btn-sm btn-green" onclick='addToCalendar(${JSON.stringify(e)})'>+ Cal</button></td>`;
      }
      html += '</tr>';
    });
    html += '</tbody></table>';
    return html;
  }

  async function loadFavorites() {
    try {
      const favs = await (await fetch('/api/favorites')).json();
      favorites = {};
      favs.forEach(f => { favorites[f.team_id] = f; });
    } catch (e) {}
  }

  async function searchTeams() {
    const q = document.getElementById('searchInput').value.trim();
    if (!q) return;
    document.getElementById('searchResults').innerHTML = '<div class="loading"><div class="spinner"></div> Searching...</div>';

    try {
      const teams = await (await fetch('/api/search/teams?name=' + encodeURIComponent(q))).json();
      if (!teams.length) {
        document.getElementById('searchResults').innerHTML = '<div class="empty">No teams found</div>';
        return;
      }
      let html = '<table><thead><tr><th></th><th>Name</th><th>League</th><th></th></tr></thead><tbody>';
      teams.forEach(t => {
        const isFav = t.id in favorites;
        const esc = (t.name || '').replace(/'/g, "\\'");
        html += `<tr style="cursor:pointer" onclick="selectTeam('${t.league}', '${t.id}', '${esc}')">
          <td><span class="fav-star" onclick="event.stopPropagation(); toggleFav('${t.id}', '${esc}', '${t.league}')">${isFav ? '\u2605' : '\u2606'}</span></td>
          <td class="team-name">${t.name || ''} ${t.logo ? '<img src="'+t.logo+'" style="height:18px;vertical-align:middle;margin-left:4px">' : ''}</td>
          <td><span class="tag tag-league">${(t.league || '').toUpperCase()}</span></td>
          <td><button class="btn btn-sm" onclick="event.stopPropagation(); selectTeam('${t.league}', '${t.id}', '${esc}')">View</button></td>
        </tr>`;
      });
      html += '</tbody></table>';
      document.getElementById('searchResults').innerHTML = html;
    } catch (e) {
      document.getElementById('searchResults').innerHTML = '<div class="empty">Error searching</div>';
    }
  }

  async function selectTeam(league, id, name) {
    document.getElementById('teamFixturesTitle').textContent = `Upcoming: ${name}`;
    document.getElementById('teamResultsTitle').textContent = `Results: ${name}`;
    document.getElementById('teamFixtures').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
    document.getElementById('teamResults').innerHTML = '<div class="loading"><div class="spinner"></div></div>';

    const [fixtures, results] = await Promise.all([
      fetch(`/api/fixtures/next/${league}/${id}`).then(r => r.json()),
      fetch(`/api/results/last/${league}/${id}`).then(r => r.json()),
    ]);

    document.getElementById('teamFixtures').innerHTML = eventsTable(fixtures, true);
    document.getElementById('teamResults').innerHTML = eventsTable(results, false);
  }

  async function toggleFav(id, name, league) {
    if (id in favorites) {
      await fetch(`/api/favorites/${id}`, { method: 'DELETE' });
      delete favorites[id];
    } else {
      await fetch(`/api/favorites/add?team_id=${id}&team_name=${encodeURIComponent(name)}&league_key=${league}`, { method: 'POST' });
      favorites[id] = { team_id: id, team_name: name, league_key: league };
    }
    searchTeams();
  }

  async function addToCalendar(event) {
    const summary = `${event.home_team} vs ${event.away_team}`;
    const body = {
      summary,
      start_date: event.date,
      start_time: event.time || null,
      venue: event.venue || null,
      description: `League: ${event.league || ''}`,
    };
    try {
      const result = await (await fetch('/api/calendar/add', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      })).json();
      if (result.link) {
        alert(`Added to calendar!\n${summary}\n${event.date}`);
      } else if (result.detail) {
        alert('Calendar error: ' + (typeof result.detail === 'string' ? result.detail : JSON.stringify(result.detail)));
      } else {
        alert('Added to calendar!');
      }
    } catch (e) {
      alert('Failed to add to calendar. Is Google OAuth configured?');
    }
  }

  loadFavorites();
</script>
</body>
</html>
